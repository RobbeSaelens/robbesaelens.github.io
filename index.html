<!doctype html>
<html lang="en">
  <head>
    <script>
      // Apply theme before first paint to prevent flash
      ;(function () {
        const theme = localStorage.getItem('theme')
        if (
          theme === 'dark' ||
          (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Full-stack web developer portfolio of Robbe Saelens. Showcasing projects in Vue, TypeScript, React, and modern web technologies."
    />
    <meta name="author" content="Robbe Saelens" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Robbe Saelens - Portfolio" />
    <meta
      property="og:description"
      content="Full-stack web developer portfolio showcasing projects in Vue, TypeScript, and modern web technologies."
    />
    <meta property="og:url" content="https://robbe-saelens.netlify.app/" />
    <meta property="og:image" content="https://robbe-saelens.netlify.app/pf2.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Robbe Saelens - Portfolio" />
    <meta
      name="twitter:description"
      content="Full-stack web developer portfolio showcasing projects in Vue, TypeScript, and modern web technologies."
    />
    <meta name="twitter:image" content="https://robbe-saelens.netlify.app/pf2.jpg" />

    <link rel="canonical" href="https://robbe-saelens.netlify.app/" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect for external resources -->
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/ubn5wdm.css" />

    <link rel="icon" type="image/png" href="/Fav.png" />
    <link rel="stylesheet" href="/styles.css" />

    <title>Robbe Saelens - Full-Stack Web Developer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      // add key theme and value light to localStorage
      if (!localStorage.getItem('theme')) {
        localStorage.setItem('theme', 'light')
      }

      const tooltipOptions = [
        'Coding Fun',
        'Dev Jokes',
        'Frontend!',
        'Backend Joy',
        'Bug Hugs',
        'JS Rocks',
        'CSS LOL',
        'API LOL',
        'HTML <3',
        'Node Fun',
      ]

      function updateTitle() {
        const randomTitle = tooltipOptions[Math.floor(Math.random() * tooltipOptions.length)]
        document.title = `Saelens - ${randomTitle}`
      }

      updateTitle()
      setInterval(updateTitle, 5000)
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Fav.png" />
    <link rel="stylesheet" href="/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
